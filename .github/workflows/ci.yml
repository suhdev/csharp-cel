name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on the same PR/branch when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Permissions needed by the deploy job below; default read for everything else.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dotnet:
    name: .NET — build, unit, conformance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out cel-csharp
        uses: actions/checkout@v4
        with:
          path: cel-csharp

      - name: Check out cel-spec (for conformance corpus)
        uses: actions/checkout@v4
        with:
          repository: google/cel-spec
          path: cel-spec

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Track the SDK pinned in global.json. setup-dotnet honours rollForward
          # but we want it to use the exact line.
          global-json-file: cel-csharp/global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('cel-csharp/**/*.csproj', 'cel-csharp/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        working-directory: cel-csharp
        run: dotnet restore

      - name: Build
        working-directory: cel-csharp
        # Directory.Build.props enables TreatWarningsAsErrors, so this fails on any warning.
        run: dotnet build --configuration Release --no-restore

      - name: Unit tests
        working-directory: cel-csharp
        run: dotnet test tests/DotnetCel.UnitTests --configuration Release --no-build --logger "console;verbosity=normal"

      - name: Conformance harness (cel-spec corpus)
        working-directory: cel-csharp
        continue-on-error: true
        run: dotnet run --project tests/DotnetCel.Conformance --configuration Release --no-build -- ../cel-spec/tests/simple/testdata

  docs:
    name: Docs — Astro build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        # Use the Pages-specific uploader so the deploy job below can publish it.
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    name: Docs — deploy to GitHub Pages
    needs: docs
    # Only deploy on push to main, never from PRs (which can't access Pages anyway).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
